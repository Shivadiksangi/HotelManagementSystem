<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Booking - Hotel Paradise</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('hotel-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    .container {
      max-width: 600px;
      background: rgba(255, 255, 255, 0.95);
      margin: 50px auto;
      padding: 30px;
      border-radius: 12px;
      color: #000;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #34495e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Book Your Room</h2>
    <form id="bookingForm">
      <label for="name">Full Name:</label>
      <input type="text" id="name" required>

      <label for="email">Email Address:</label>
      <input type="email" id="email" required>

      <label for="aadhar">Aadhar Card Number:</label>
      <input type="text" id="aadhar" pattern="\d{12}" maxlength="12" title="Enter a valid 12-digit Aadhar number" required>

      <label for="aadharPhoto">Upload Aadhar Card Photo:</label>
      <input type="file" id="aadharPhoto" accept="image/*" required>

      <label for="checkin">Check-in Date:</label>
      <input type="date" id="checkin" required>

      <label for="checkout">Check-out Date:</label>
      <input type="date" id="checkout" required>

      <label for="roomType">Room Type:</label>
      <select id="roomType" required>
        <option value="">-- Select Room Type --</option>
        <option value="Single Room">Single Room</option>
        <option value="Double Room">Double Room</option>
        <option value="Deluxe Suite">Deluxe Suite</option>
      </select>

      <button type="submit">Book Now</button>
    </form>
  </div>

  <script>
    document.getElementById('bookingForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const aadhar = document.getElementById('aadhar').value;
      const checkin = document.getElementById('checkin').value;
      const checkout = document.getElementById('checkout').value;
      const roomType = document.getElementById('roomType').value;
      const photoFile = document.getElementById('aadharPhoto').files[0];

      if (!photoFile) {
        alert("Please upload your Aadhar card photo.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const photoBase64 = reader.result;

        const bookingData = {
          name,
          email,
          aadhar,
          checkin,
          checkout,
          roomType,
          aadharPhoto: photoBase64
        };

        localStorage.setItem('bookingData', JSON.stringify(bookingData));
        window.location.href = 'bill.html';
      };

      reader.readAsDataURL(photoFile);
    });
  </script>
</body>
</html>
